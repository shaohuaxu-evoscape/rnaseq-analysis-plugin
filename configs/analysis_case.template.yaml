# RNA-seq Analysis Case Configuration
#
# Generated by the rnaseq-analysis plugin setup wizard.
# Edit values below, then run the pipeline.
#
# See the Config Reference in the rnaseq-analysis plugin for full field docs.

# ── Remote Preprocessing ─────────────────────────────────────────────────────
# When enabled, preprocessing (steps 0a-0d) runs on a remote server via
# MCP remote-linux instead of locally. Requires mcp__remote-linux configured
# in Claude Code settings.
remote:
  enabled: false
  host: ""                          # Remote hostname or IP
  user: ""                          # SSH username
  data_dir: ""                      # Remote path to raw FASTQ data directory
  work_dir: ""                      # Remote working directory for preprocessing outputs
  reference_genome: ""              # Remote path to reference genome .fa
  reference_gtf: ""                 # Remote path to gene annotation .gtf
  threads: 8                        # Threads for remote tools (fastp, hisat2, samtools)

# ── Run settings ─────────────────────────────────────────────────────────────
run_name: "my_analysis"

module1_overrides: {}

# ── Batch inputs ─────────────────────────────────────────────────────────────
# Define your data sources. Each batch needs either a pre-computed count
# matrix or a path to raw FASTQ files for automatic preprocessing.
batches:
  batch1:
    gene_counts: "path/to/gene_counts.tsv"   # TSV: gene_id | cond-timepoint columns
    # raw_fastq_dir: "/path/to/raw/fastq"    # Uncomment for auto preprocessing

# ── Target conditions ────────────────────────────────────────────────────────
# Exactly two conditions for pairwise comparison.
# "condition" must match the column prefix in gene_counts.tsv.
target_conditions:
  condition1:
    - batch: batch1
      condition: CONTROL       # e.g., column names: CONTROL-0, CONTROL-24
  condition2:
    - batch: batch1
      condition: TREATMENT     # e.g., column names: TREATMENT-0, TREATMENT-24

# ── Project metadata ─────────────────────────────────────────────────────────
project:
  name: "My Project"
  organism: "Species name"
  strain: ""
  organism_taxid: 0             # NCBI taxonomy ID (e.g., 4952 for Y. lipolytica)
  gene_id_prefix: ""            # Gene name prefix in count matrix (e.g., "YALI1_") — FILL THIS IN

# ── Analysis selection ───────────────────────────────────────────────────────
experiment:
  # If omitted, all shared timepoints between the two target conditions
  # will be detected automatically.
  # timepoints: [0, 6, 12, 24, 48]

# ── Input paths ──────────────────────────────────────────────────────────────
paths:
  reference_genome: "inputs/ref/genome.fa"
  reference_gtf: "inputs/ref/genes.gtf"

# ── Hidden Preprocessing (auto-triggered when gene_counts.tsv is missing) ───
preprocessing:
  threads: 8
  test_n_samples: 0

  hisat2_index:
    enabled: true
  fastp:
    enabled: true
    cut_mean_quality: 20
    qualified_quality_phred: 20
    unqualified_percent_limit: 40
    length_required: 50
  hisat2_align:
    enabled: true
  htseq_count:
    enabled: true

# ── Normalization ────────────────────────────────────────────────────────────
normalization:
  method: "tpm"              # "cpm" | "tpm" | "fpkm"
  log_transform: true
  pseudocount: 1
  gene_filtering:
    min_expr: 1.0
    min_samples: 2

# ── Sample Analysis ──────────────────────────────────────────────────────────
sample_analysis:
  expression_summary:
    enabled: true
    stats: ["mean", "median", "cv"]
  correlation:
    enabled: true
    method: "pearson"
    plot_upper_triangle: true
    annot_fontsize: 8
  pca:
    enabled: true
    n_components: 5
    plot_pairs: [[1, 2], [1, 3]]
  clustering:
    enabled: true
    top_n_genes: 2000
    k_range: [4, 12]
    fixed_k: 7
    random_state: 42

# ── Differential Analysis ────────────────────────────────────────────────────
differential_analysis:
  de_screening:
    enabled: true
    method: "deseq2_wald"     # DESeq2 Wald test on raw counts; "ols" for legacy OLS fallback
    fdr_threshold: 0.05
    log2fc_threshold: 0.585    # = log2(1.5)
    fdr_method: "bh"
  go_enrichment:
    enabled: true
    organism_taxid: 0          # NCBI taxonomy ID — FILL THIS IN
    ontologies: ["BP", "MF", "CC"]
    sig_threshold: 0.05
    min_term_genes: 5
    max_term_genes: 500
    top_n_plot: 20
  kegg_enrichment:
    enabled: true
    organism: ""               # KEGG organism code — FILL THIS IN (e.g., "sce", "eco")
    sig_threshold: 0.05
    min_pathway_genes: 5
    max_pathway_genes: 500
    top_n_plot: 20
  gsea:
    enabled: true
    ranking_metric: "mean_log2fc"
    min_size: 10
    max_size: 500
    permutations: 1000

# ── Advanced Analysis ────────────────────────────────────────────────────────
advanced_analysis:
  transporter_aminopeptidase:
    enabled: false             # Requires organism-specific GO annotations

  temporal_causality:
    enabled: false             # Enable and configure gene modules below if applicable
    # modules:                 # Define organism-specific gene modules for temporal analysis
    #   torc1_activators: ["GENE_A", "GENE_B"]   # TORC1 activator genes
    #   torc1_neg_regs: ["GENE_C", "GENE_D"]     # TORC1 negative regulators
    #   sterol: ["GENE_E", "GENE_F"]             # Sterol pathway genes
    #   fa_degradation: ["GENE_G", "GENE_H"]     # Fatty acid degradation genes
    #   mva: ["GENE_I", "GENE_J"]                # MVA pathway genes

  heterologous_genes:
    enabled: false             # Enable and configure gene_list below if applicable
    # gene_list:
    #   - name: "GeneA"
    #     function: "Description of function"
    #     color: "#D32F2F"
    #   - name: "GeneB"
    #     function: "Description of function"
    #     color: "#1976D2"
    # fusion_rules: []         # Optional: [{fusion: "FusedAB", parts: ["GeneA", "GeneB"]}]

  fermentation_overview:
    enabled: false             # Enable and configure below if you have fermentation data
    # data_file: "inputs/fermentation_data.xlsx"
    # sheet_name: "Sheet1"
    # reactor_id_column: "Reactor_ID"
    # time_column: "Run_time (t)"
    # reactor_ids: ["R01", "R02"]
    # metrics:                 # Column names to plot
    #   biomass: "Biomass (g)"
    #   product: "Product (%)"
    #   substrate: "Substrate (g/L)"
    #   feed: "Feed_amount (g)"

# ── Cluster Analysis ─────────────────────────────────────────────────────────
cluster_analysis:
  cluster_deepdive:
    enabled: true

# ── Plot Settings ────────────────────────────────────────────────────────────
plot:
  dpi: 300
  format: "png"
  style: "nature"
  colormap: "RdPu"
  recipe_colors:
    condition1: "#4477AA"
    condition2: "#EE6677"
  font_family: "Arial"
  figsize_default: [3.5, 2.8]
